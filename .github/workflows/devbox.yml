---
name: devbox
on:
  pull_request:
    branches: [main, master]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  make:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - update
          - upgrade
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run just ${{matrix.target}}
        uses: ./
        with:
          checkout: false
          run: "just ${{matrix.target}}"
          cache: "false"

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - make
          - just
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run just configure
        run: just configure
        env:
          GIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Run ${{matrix.build}} requirements target
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} requirements"
          path: tests/collection
          cache: "false"

      - name: Run ${{matrix.build}} build target
        uses: ./
        with:
          checkout: false
          install: false
          run: "${{matrix.build}} install build"
          path: tests/collection
          cache: "false"

  collection:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - make
          - just
        target:
          - lint
          - test
          - init
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run just configure
        run: just configure
        env:
          GIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Run ${{matrix.build}} ${{matrix.target}} target
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} install ${{matrix.target}}"
          path: tests/collection
          cache: "false"

  role:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - make
          - just
        target:
          - lint
          - test
          - init
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run ${{matrix.build}} configure target
        run: just configure
        env:
          GIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Run ${{matrix.build}} ${{matrix.target}}
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} install ${{matrix.target}}"
          path: tests/role
          cache: "false"

  version-update:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - make
          - just
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run ${{matrix.build}} configure target
        run: just configure
        env:
          GIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Run ${{matrix.build}} version-check target
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} version-check GALAXY_FILE=galaxy.yml GALAXY_PATH=tests/collection/galaxy.yml"
          path: tests/collection
          cache: "false"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        if: matrix.build == "make"

      - name: Run ${{matrix.build}} version-check target
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} version-check --set GALAXY_FILE galaxy.yml --set GALAXY_PATH tests/collection/galaxy.yml"
          path: tests/collection
          cache: "false"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        if: matrix.build == "just"

  version-unchanged:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - make
          - just
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run just configure
        run: just configure
        env:
          GIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      - name: Run ${{matrix.build}} version-check on unchanged version
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} version-check GALAXY_FILE=galaxy.yml GALAXY_PATH=tests/collection/galaxy.yml"
          path: tests/collection
          cache: "false"
        env:
          BASE_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        continue-on-error: true
        id: check_fail
        if: matrix.build == "make"

      - name: Run ${{matrix.build}} version-check on unchanged version
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} version-check --set GALAXY_FILE galaxy.yml --set GALAXY_PATH tests/collection/galaxy.yml"
          path: tests/collection
          cache: "false"
        env:
          BASE_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        continue-on-error: true
        id: check_fail
        if: matrix.build == "just"

      - name: Validate version-check result
        if: steps.check_fail.outcome == 'success'
        run: |
          echo "Version check dit not signal failure on missing version update."
          exit 1

  version-downgrade:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build:
          - make
          - just
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just yq

      - name: Run just configure
        run: just configure
        env:
          GIT_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GIT_BRANCH: ${{ github.head_ref || github.ref_name }}

      # HEAD_SHA is set to commit 3609fc62d3af0c1ba8cbca940abf28e2e82a6f21, which is the last release before version 0.0.3.
      # This is used for downgrade testing to ensure version-check fails as expected.
      - name: Run ${{matrix.build}} version-check
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} version-check GALAXY_FILE=galaxy.yml GALAXY_PATH=tests/collection/galaxy.yml"
          path: tests/collection
          cache: "false"
        env:
          BASE_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: 3609fc62d3af0c1ba8cbca940abf28e2e82a6f21
        continue-on-error: true
        id: check_fail
        when: matrix.build == "make"

      - name: Run ${{matrix.build}} version-check
        uses: ./
        with:
          checkout: false
          run: "${{matrix.build}} version-check --set GALAXY_FILE galaxy.yml --set GALAXY_PATH tests/collection/galaxy.yml"
          path: tests/collection
          cache: "false"
        env:
          BASE_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: 3609fc62d3af0c1ba8cbca940abf28e2e82a6f21
        continue-on-error: true
        id: check_fail
        when: matrix.build == "just"

      - name: Validate ${{matrix.build}} version-check result
        if: steps.check_fail.outcome == 'success'
        run: |
          echo "Version check dit not signal failure on version downgrade."
          exit 1
